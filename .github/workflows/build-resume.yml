name: Check Resume PDF

on:
  push:
    paths:
      - "resume/**"
      - "scripts/build_resume.sh"
      - "Makefile"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile LaTeX resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: resume
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error
