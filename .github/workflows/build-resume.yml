name: Build Resume PDF

on:
  push:
    paths:
      - "resume/**"
      - "scripts/build_resume.sh"
      - "Makefile"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile LaTeX resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: resume
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Copy generated PDF to website asset path
        run: cp resume/cv.pdf assets/files/resume_Yifei.pdf

      - name: Commit rebuilt PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild resume pdf"
          file_pattern: assets/files/resume_Yifei.pdf
